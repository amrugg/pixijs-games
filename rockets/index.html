    function launchMissile(type, position, target, speed) {
        if(type === "good") {
            var laser = new Sprite(resources["sprites/missile.png"].texture);
            laser.good = true;
        } else {
            /// TODO: Red
            var laser = new Sprite(resources["sprites/missile.png"].texture);
            laser.good = false;
        }
        laser.speed = speed;
        laser.x = position.x;
        laser.y = position.y;
        laser.anchor.set(0.5,0.5);
        if(type === "good") {
            laser.health = 300;
        } else {
            laser.health = 200;
        }
        laser.target = target;
        missiles.push(laser);
        app.stage.addChild(laser);
    }
    var storeRange;
    function shootLaser(type, position, dir) {
        if(type === "good") {
            var laser = new Sprite(resources["sprites/laser.png"].texture);
            laser.good = true;
        } else {
            var laser = new Sprite(resources["sprites/enemy-laser.png"].texture);
            laser.good = false;
        }
        laser.x = position.x;
        laser.y = position.y;
        laser.anchor.set(0.5,0.5);
        laser.speed = 20;
        if(type === "good" && rocket.tek.leftFlare && rocket.tek.rightFlare && keys.ArrowUp) {
            laser.speed = 40;
        }
        laser.scale.set(3*scaleFactor);
        laser.rotation = -dir;
        lasers.push(laser);
        app.stage.addChild(laser);
    }
    function press(key){
        if(keys[key]){
            keys[key] = false;
            return true;
        }
        return false;
    }
    addEventListener("mousedown",function(e){
        if(e.button == 0) {
            keys.mouse = true;
        } else if(e.button == 2) {
            keys.rightMouse = true;
        }
        mouseX = e.pageX;
        mouseY = e.pageY;
    });
    addEventListener("mouseup",function(e){
        if(e.button == 0) { 
            keys.mouse = false;
        } else if(e.button == 2) {
            keys.rightMouse = true;
        }
    });
    addEventListener("blur", function (){
        keys = {};
    });
    addEventListener("mousemove",function(e){
        mouseX = e.pageX;
        mouseY = e.pageY;
    });
    var learnSpeed = 2;
    var answersLocked = false;
    var code = ["R", "E", "S", "T", "O", "R", "E"];
    var codeNum = 0;
    var mistakeReview = false;
    addEventListener("keydown", function (e){
        if(code[codeNum] === e.key) {
            ++codeNum;
            if(codeNum === code.length) {
                codeNum = 0;
                healthBar.width = 200;
                energyBar.width = 200;
                if(!invincible) {
                    invincible = true;
                    rocket.alpha = 0.5;
                    setTimeout(function() {
                        invincible = false;
                        rocket.alpha = 1;
                    }, 5000);
                }
            }
        }
        if(!reverse) {
            handleNumber(e);
        } else {
            e.preventDefault();
            handleText(e);
        }
        keys[e.key] = true;
        if(e.ctrlKey || e.metaKey) {
            keys.ctrl = true;
        }
        if(e.shiftKey) {
            keys.shift = true;
        }
        if(e.altKey) {
            keys.alt = true;
        }
    });
    function handleText(e) {
        if(answersLocked) {
            return;
        }
        if(e.key === "Enter") {
            answersLocked = true;
            textDiv.innerHTML = curVerse;
            textDiv.style.color = "green";
            setTimeout(function() {
                textDiv.style.color = "white";
                answersLocked = false;
                typingIndex = 0;
                textDiv.innerHTML = "";
                curVerse = randVerse();
                correctAnswer = curVerse[0];
                curVerse = curVerse[1];
                numDiv.innerHTML = correctAnswer;
            },3000);
        } else {
            var keystroke = e.key.toLowerCase();
            var words = curVerse.split(" ");
            if(keystroke === words[typingIndex][0].toLowerCase()) {
                textDiv.innerHTML += words[typingIndex++] + " ";
                if(typingIndex === typingMax || typingIndex >= words.length) {
                    if(restoreHealthWithQuestion) {
                        healthBar.width += 10 * typeBonus;
                    }
                    if(energyBar.width + 40 * typeBonus > 200) {
                        healthBar.width += (energyBar.width + 40 * typeBonus - 200)/3;
                        energyBar.width = 200;
                    } else {
                        energyBar.width += 40 * typeBonus;
                    }
                    if(healthBar.width > 200) {
                        healthBar.width = 200;
                    }
                    if(verseTracking[correctAnswer]) {
                        verseTracking[correctAnswer].correct += 5;
                    } else {
                        verseTracking[correctAnswer] = {correct: 5, incorrect: 0};
                    }
                    numDiv.innerHTML = "";
                    --questionsLeft;
                    if(questionsLeft <= 0) {
                        if(chapter !== false) {
                            if(rangeDiv.innerHTML !== "Review") {
                                var range = rangeDiv.innerHTML;
                            } else {
                                range = storeRange;
                            }
                            var full = true;
                            if (range.split("-")[0] === "1") {
                                var arr = range.split(/\-|\,/);
                                if(Number(arr[1]) + 3 < rom18[chapter-1].length) {
                                    range = (Number(arr[1])) + "-" + (Number(arr[1]) + 3);
                                } else if(Number(arr[1]) < rom18[chapter-1].length) {
                                    range = arr[1] + "-" + rom18[chapter-1].length;
                                }
                                full = false;
                                rangeDiv.innerHTML = range;
                                mistakeReview = false;
                            } else {
                                var arr = range.split(/\-|\,/);
                                range = "1-" + arr[1];
                                rangeDiv.innerHTML = range;
                                mistakeReview = false;
                            }
                            var cur = range.split(/\-|\,/);
                            if(Number(cur[0]) < Number(cur[1]) && Number(cur[0]) >= 0) {
                                if(Number(cur[1]) <= rom18[chapter-1].length) {
                                    params.min = cur[0];
                                    params.max = cur[1];
                                }
                            }
                            if(full && !mistakeReview) {
                                questionsLeft = params.max/learnSpeed;
                            } else {
                                questionsLeft = params.max/(2*learnSpeed);
                            }
                        }
                    }
                    typingIndex = 0;
                    textDiv.innerHTML = "";
                    curVerse = randVerse();
                    correctAnswer = curVerse[0];
                    curVerse = curVerse[1];
                    numDiv.innerHTML = correctAnswer;
                }
            }   
        }
    }
    function handleNumber(e) {
        if(!answersLocked && ((Number(e.key) >= 0 && e.key !== " ") || e.key === "." || e.key === ":")) {
            numDiv.innerHTML += e.key;
        }
        if(e.key === "Enter" && !answersLocked) {
            if (numDiv.innerHTML === correctAnswer || (chapter !== false && (correctAnswer.split(".")[1] === numDiv.innerHTML)) || numDiv.innerHTML.replace(" ",".") === correctAnswer || numDiv.innerHTML.replace(":",".") === correctAnswer) { 
                if(restoreHealthWithQuestion) {
                    healthBar.width += 10;
                }
                if(energyBar.width + 40 > 200) {
                    healthBar.width += (energyBar.width + 40 - 200)/3;
                    energyBar.width = 200;
                } else {
                    energyBar.width += 40;
                }
                if(healthBar.width > 200) {
                    healthBar.width = 200;
                }
                if(verseTracking[correctAnswer]) {
                    verseTracking[correctAnswer].correct += 5;
                } else {
                    verseTracking[correctAnswer] = {correct: 5, incorrect: 0};
                }
                numDiv.innerHTML = "";
                --questionsLeft;
                if(questionsLeft <= 0) {
                    if(chapter !== false) {
                        if(rangeDiv.innerHTML !== "Review") {
                            var range = rangeDiv.innerHTML;
                        } else {
                            range = storeRange;
                        }
                        var full = true;
                        if (range.split("-")[0] === "1") {
                            var arr = range.split(/\-|\,/);
                            if(Number(arr[1]) + 3 < rom18[chapter-1].length) {
                                range = (Number(arr[1])) + "-" + (Number(arr[1]) + 3);
                            } else if(Number(arr[1]) < rom18[chapter-1].length) {
                                range = arr[1] + "-" + rom18[chapter-1].length;
                            }
                            full = false;
                            rangeDiv.innerHTML = range;
                            mistakeReview = false;
                        } else {
                            var arr = range.split(/\-|\,/);
                            range = "1-" + arr[1];
                            rangeDiv.innerHTML = range;
                            mistakeReview = false;
                        }
                        var cur = range.split(/\-|\,/);
                        if(Number(cur[0]) < Number(cur[1]) && Number(cur[0]) >= 0) {
                            if(Number(cur[1]) <= rom18[chapter-1].length) {
                                params.min = cur[0];
                                params.max = cur[1];
                            }
                        }
                        if(full && !mistakeReview) {
                            questionsLeft = params.max/learnSpeed;
                        } else {
                            questionsLeft = params.max/(2*learnSpeed);
                        }
                    }
                }
            } else {
                if(verseTracking[correctAnswer]) {
                    verseTracking[correctAnswer].incorrect += 5;
                } else {
                    verseTracking[correctAnswer] = {correct: 0, incorrect: 5};
                }
                answersLocked = true;
                numDiv.style.color = "red";
                var corAns = correctAnswer;
                setTimeout(function() {
                    numDiv.style.color = "green";
                    numDiv.innerHTML = corAns;
                },1000);
                setTimeout(function() {
                    numDiv.style.color = "white";
                    numDiv.innerHTML = "";
                    answersLocked = false;
                },2000);
            }

            curVerse = randVerse();
            correctAnswer = curVerse[0];
            curVerse = curVerse[1];
            textDiv.innerHTML = curVerse;
        }
        if(e.key === "Delete" || e.key === "Backspace") {
            numDiv.innerHTML = "";
        }
    }
    addEventListener("keyup", function (e){
        keys[e.key] = false;
        console.log(e.ctrlKey);
        keys.ctrl = e.ctrlKey;
        keys.shift = e.shiftKey;
        keys.alt = e.altKey;
    });
    function loadBuff(num) {
        if(num === 1) {
            canUseMissiles = true;
            healthToHit -= 2;
            energyToFire--;
        } else if (num === 2) {
            canUseEMP = true;
            healthToHit -= 2;
            energyToFire--;
        } else if(num === 3) {
            reloadTime /= 2;
            canUseLaser = true;
        }
    }
