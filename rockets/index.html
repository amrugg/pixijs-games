em that were nigh.","For through him we both have access by one Spirit unto the Father.","Now therefore ye are no more strangers and foreigners, but fellowcitizens with the saints, and of the household of God;","And are built upon the foundation of the apostles and prophets, Jesus Christ himself being the chief corner stone;","In whom all the building fitly framed together groweth unto an holy temple in the Lord:","In whom ye also are builded together for an habitation of God through the Spirit."],

e ignorance that is in them, because of the blindness of their heart:","Who being past feeling have given themselves over unto lasciviousness, to work all uncleanness with greediness.","But ye have not so learned Christ;","If so be that ye have heard him, and have been taught by him, as the truth is in Jesus:","That ye put off concerning the former conversation the old man, which is corrupt according to the deceitful lusts;","And be renewed in the spirit of your mind;","And that ye put on the new man, which after God is created in righteousness and true holiness.","Wherefore putting away lying, speak every man truth with his neighbour: for we are members one of another.","Be ye angry, and sin not: let not the sun go down upon your wrath:","Neither give place to the devil.","Let him that stole steal no more: but rather let him labour, working with his hands the thing which is good, that he may have to give to him that needeth.","Let no corrupt communication proceed out of your mouth, but that which is good to the use of edifying, that it may minister grace unto the hearers.","And grieve not the holy Spirit of God, whereby ye are sealed unto the day of redemption.","Let all bitterness, and wrath, and anger, and clamour, and evil speaking, be put away from you, with all malice:","And be ye kind one to another, tenderhearted, forgiving one another, even as God for Christ's sake hath forgiven you."],

sband is the head of the wife, even as Christ is the head of the church: and he is the saviour of the body.","Therefore as the church is subject unto Christ, so let the wives be to their own husbands in every thing.","Husbands, love your wives, even as Christ also loved the church, and gave himself for it;","That he might sanctify and cleanse it with the washing of water by the word,","That he might present it to himself a glorious church, not having spot, or wrinkle, or any such thing; but that it should be holy and without blemish.","So ought men to love their wives as their own bodies. He that loveth his wife loveth himself.","For no man ever yet hated his own flesh; but nourisheth and cherisheth it, even as the Lord the church:","For we are members of his body, of his flesh, and of his bones.","For this cause shall a man leave his father and mother, and shall be joined unto his wife, and they two shall be one flesh.","This is a great mystery: but I speak concerning Christ and the church.","Nevertheless let every one of you in particular so love his wife even as himself; and the wife see that she reverence her husband."],

    function randInt(min, max, not) {
        if(max === undefined) {
            max = min
            min = 1
        }
        var num = Math.floor(Math.random() * (max - min + 1)) + min;
        while(num === not && max-min > 0) {
            num = Math.floor(Math.random() * (max - min + 1)) + min;
        }
        return num;
    }
    function weightedRandInt(min,max, not, chapter) {
        console.log("Min:", min, "Max:", max);
        var weightedArr = [];
        var sum = 0;
        var maxNum = max;
        for(var i = 0; i <= maxNum; i++) {
            if(i < min) {
                weightedArr.push(0);
                continue;
            }
            var score = 1;
            if(verseTracking[getRealChapter(chapter) + "." + (i+1).toString()]) {
                var cur = verseTracking[getRealChapter(chapter) + "." + (i+1).toString()];
                if(cur) {
                    if(cur.correct && cur.incorrect) {
                        score /= cur.correct/cur.incorrect;
                    } else if(cur.correct) {
                        score /= cur.correct;
                    } else {
                        score += cur.incorrect;
                    }
                }
            }
            weightedArr.push(sum+score);
            sum += score;
        }
        console.log("Sum:", sum, "arr:", weightedArr, "not", not);
        var randomNumber = not;
        while(randomNumber === not) {
            var rand = Math.random() * (sum+1);
            for(var i = 0; i < weightedArr.length; i++) {
                if(weightedArr[i] >= rand) {
                    randomNumber = i;
                    i = Infinity;
                }
            }
        }
        if(randomNumber < min) {
            console.log(rand,weightedArr);
        }
        return randomNumber;
    }
    function getRealChapter(chapter) {
        return (chapter).toString();
    }
    function randVerse() {
        if(chapter) {
            var verseArr = rom18[chapter-1];
            var rand = weightedRandInt((params.min ? Number(params.min)-1 : 0), Number(params.max)-1 || verseArr.length-1, (correctAnswer ? Number(correctAnswer.split(".")[1])-1 : -1), chapter);
            if(chapter === 7) {
                var verseNumber = 20 + "." + (rand+1);
            } else {
                var verseNumber = (chapter) + "." + (rand+1);
            }
            if(toCrack) {
                return [verseNumber, crack(gauntletArr[chapter-1][rand])];
            } else {
                return [verseNumber, verseArr[rand]];
            }
        } else {
            var currentRandChapter = randInt(0,5)
            var verseArr = rom18[currentRandChapter];
            var rand = randInt(0,verseArr.length-1);
            var verseNumber = (currentRandChapter+1) + "." + (rand+1);
            if(toCrack) {
                return [verseNumber, crack(gauntletArr[currentRandChapter][rand])];
            } else {
                return [verseNumber, verseArr[rand]];
            }
        }
    }
    function crack(string) {
        var arr = string.split(/[\.|\,|\;|\:]/g).filter(function(e){return e.trim()});
        console.log(arr)
        for(var i = 0; i < 1; i++) {
            var cur = arr[randInt(0,arr.length-1)].trim();

    function overlaps(str) {
        var occurs = 0;
        for(var i = 0; i < gauntletArr.length; i++) {
            var curArr = gauntletArr[i];
            for(var j = 0; j < curArr.length; j++) {
                var cur = curArr[j].split(/[\.|\,|\;|\:]/g).filter(function(e){return e.trim()});
                cur.forEach(function(e) {
                    if(e.trim() === str) {
                        ++occurs;

                    }
                });
                if(occurs > 1) {
                    return true;
                }
            }
        }
        return false;
    }

                        alert(`You got the Laser! Hold ${key} to activate the Laser.\nThe Laser does damage to anything it touches but drains your energy quickly.`);
                    }
                    if(enemy.laser) {
                        enemy.laser.visible = false;
                    }
                    app.stage.removeChild(enemy);
                    enemies.splice(i,1);
                    --i;
                }
            }
        }
        if(enemies.length === 0) {
            ++level;
            difficulty += 0.05;
            if(level < 6) {
                spawnNewEnemy(level, "easy");
            } else if (level < 6.1) {
                if(reverse) {
                    alert(`Ooh, your first boss! Don't stand to close to him when he shoots his missiles.\nYou can hold Shift (when moving right) or Ctrl (when moving left) to boost your speed at the cost of spending more energy.`);
                } else {
                    alert(`Ooh, your first boss! Don't stand to close to him when he shoots his missiles.\nYou can hold X (when moving right) or Z (when moving left) to boost your speed at the cost of spending more energy.`);
                }
                spawnNewEnemy(1, "boss1");
                music.fade(0.5,0,2000);
                setTimeout(function(){
                    boss1.play();
                    boss1.fade(0,0.5,2000);
                }, 2000);
            } else if(level < 8) {
                spawnNewEnemy(2, "medium");
            } else if(level < 10) {
                spawnNewEnemy(3, "medium");
            } else if(level < 11) {
                spawnNewEnemy(4, "medium");
            } else if(level < 11.1) {
                alert(`Second boss fight coming up! What should I say? Maybe... just keep moving?`);
                spawnNewEnemy(1, "boss2");
                music.fade(0.5,0,2000);
                setTimeout(function(){
                    boss2.play();
                    boss2.fade(0,0.5,2000);
                }, 2000);
            } else if(level < 12) {
                spawnNewFormation("drone", "V", 4);
            } else if(level < 13) {
                spawnNewFormation("drone", "N", 5);
            } else if(level < 14) {
                spawnNewFormation("drone", "V", 7);
            } else if (level < 15) {
                spawnNewFormation("drone", "N", 9);
            } else if(level < 16) {
                spawnNewFormation("drone", "N", 5);
                spawnNewFormation("drone", "V", 5);
            } else if(level < 16.1) {
                alert(`Third boss fight coming up! I'm sure you've got this! A hint? Hmm... don't stand in the middle?`);
                music.fade(0.5,0,2000);
                setTimeout(function(){
                    boss3.play();
                    boss3.fade(0,0.5,2000);
                }, 2000);
                spawnNewEnemy(1, "boss3")[0].xOffset = 200;
                spawnNewEnemy(1, "boss3")[0].xOffset = -200;
                spawnNewEnemy(1, "boss3")[0].xOffset = 0;
            } else if(fullLevel) {
                alert(`ENEMY MOTHERSHIP DETECTED\nYou've demonstrated awesome RA skills so far! Keep quizzing and keep moving!`);
                spawnNewEnemy(1, "mothership");
                if(levelEl.selectedIndex === 0) {
                    difficulty = 1;
                    invincible = true;
                } else if(levelEl.selectedIndex === 1) {
                    difficulty = 0.25;
                } else if(levelEl.selectedIndex === 2) {
                    difficulty = 0.5;
                } else if(levelEl.selectedIndex === 3) {
                    difficulty = 0.75;
                } else if(levelEl.selectedIndex === 4) {
                    difficulty = 1;
                } else if(levelEl.selectedIndex === 5) {
                    difficulty = 1.25;
                }
                music.fade(0.5,0,2000);
                setTimeout(function(){
                    mothership.play();
                    mothership.fade(0,0.5,2000);
                }, 2000);
            } else {
                spawnNewEnemy(level/5, "medium");
                spawnNewEnemy(level/5, "easy");
                if(level > 20) {
                    spawnNewFormation("drone", "N", 5);
                    spawnNewFormation("drone", "V", 5);
                    fullLevel = true;
                } else if(level > 19) {
                    spawnNewFormation("drone", "N", 5);
                } else if(level > 18) {
                    spawnNewFormation("drone", "V", 3);
                }
            }
        }
        for(var i = 0; i < explosions.length; i++) {
            explosions[i].alpha -= 0.05;
            if(explosions[i].alpha <= 0) {
                app.stage.removeChild(explosions[i]);
                explosions.splice(i,1);
                --i;
            }
        }
    }
    var formations = [];
    function spawnNewFormation(type, formation, endSize) {
        var set = [];
        if(formation === "V") {
            var counter = Math.floor((innerWidth/2-100)/100);
            for(var i = ((Math.ceil(innerWidth/200) * 100 ) -endSize*100); i < innerWidth/2; i+=100) {
                set.push(spawnNewEnemy(1, type, {x:i, y: counter*-100-200})[0])
                --counter;
            }
            // i += 100;
            for(i; i < innerWidth/2 + endSize*100; i += 100) {
                set.push(spawnNewEnemy(1, type, {x:i, y: counter*-100-200})[0])
                ++counter;
            }
        } else if(formation === "N") {
            var counter = Math.floor((innerWidth/2-100)/100);
            for(var i = ((Math.ceil(innerWidth/200) * 100 ) -endSize*100); i < innerWidth/2; i+=100) {
                set.push(spawnNewEnemy(1, type, {x:i, y: counter*-100-200})[0])
                ++counter;
            }
            // i += 100;
            for(i; i < innerWidth/2 + endSize*100; i += 100) {
                set.push(spawnNewEnemy(1, type, {x:i, y: counter*-100-200})[0])
                --counter;
            }
        }
        for(let i = 0; i < set.length; i++) {
            set[i].formation = set;
            set[i].formationMovement = {x:0,y:0};
        }
        formations.push(set);
    }
    function spawnNewEnemy(amount, type, position) {

                app.stage.addChild(enemy);
                enemy.scale.set(3*scaleFactor);
                enemy.anchor.set(0.5,0.5);
                if(position) {
                    enemy.x = position.x;
                    enemy.y = position.y;
                } else {

                }

                enemy.reloadTime = 3000/difficulty;
            } else if(type === "boss3") {
                var enemy = new Sprite(resources["sprites/boss3.png"].texture);
                app.stage.addChild(enemy);
                enemy.scale.set(3*scaleFactor);
                enemy.anchor.set(0.5,0.5);
                if(position) {
                    enemy.x = position.x;
                    enemy.y = position.y;
                } else {
                    enemy.x = randInt(100, innerWidth - 100);
                    enemy.y = -600;
                }
                enemy.rotation = Math.PI;
                enemy.health = 15 * difficulty;
                enemy.lastFire = 0;
                enemy.reloadTime = 5000/difficulty;
                enemy.laserFire = Date.now();
                enemy.laserRate = 10000/difficulty;
                enemy.energy = 150;
                enemy.backupFire = Date.now() - randInt(0, 30000);
                enemy.backupRate = 55000/difficulty;
                enemy.laser = new PIXI.Graphics();
                enemy.laser.beginFill(0xffaaaa);
                enemy.laser.drawRect(-25,0,50, innerHeight * 2);
                app.stage.addChild(enemy.laser);
                enemy.laser.visible = false;
                if(enemies[0]) {
                    if(enemies[0].level === "bossattack") {
                        enemy.health *= 1.5;
                    }
                }
            } else if(type === "mothership") {
                var enemy = new Sprite(resources["sprites/mothership.png"].texture);
                app.stage.addChild(enemy);
                enemy.scale.set(3*scaleFactor);
                enemy.anchor.set(0.5,0.5);
                if(position) {
                    enemy.x = position.x;
                    enemy.y = position.y;
                } else {
                    enemy.x = randInt(100, innerWidth - 100);
                    enemy.y = -600;
                }
                enemy.rotation = Math.PI;
                enemy.health = 100 * difficulty;
                enemy.lastFire = 0;
                enemy.reloadTime = 2500/difficulty;
                enemy.laserFire = Date.now();
                enemy.laserRate = 5000/difficulty;
                enemy.energy = 200;
                enemy.backupFire = Date.now() - randInt(0, 30000);
                enemy.backupRate = 55000/difficulty;
                enemy.laser = new PIXI.Graphics();
                enemy.laser.beginFill(0xffaaaa);
                enemy.laser.drawRect(-25,0,50, innerHeight * 2);
                app.stage.addChild(enemy.laser);
                enemy.laser.visible = false;
            }
            enemiesAdded.push(enemy);
            enemy.level = type;
            enemies.push(enemy);
            y -= 150 + randInt(25,100);

        return enemiesAdded;
    }
    function launchMissile(type, position, target, speed) {
        if(type === "good") {
            var laser = new Sprite(resources["sprites/missile.png"].texture);
            laser.good = true;
        } else {
            /// TODO: Red
            var laser = new Sprite(resources["sprites/missile.png"].texture);
            laser.good = false;
        }
        laser.speed = speed;
        laser.x = position.x;
        laser.y = position.y;
        laser.anchor.set(0.5,0.5);
        if(type === "good") {
            laser.health = 300;
        } else {
            laser.health = 200;
        }
        laser.target = target;
        missiles.push(laser);
        app.stage.addChild(laser);
    }
    var storeRange;
    function shootLaser(type, position, dir) {
        if(type === "good") {
            var laser = new Sprite(resources["sprites/laser.png"].texture);
            laser.good = true;
        } else {
            var laser = new Sprite(resources["sprites/enemy-laser.png"].texture);
            laser.good = false;
        }
        laser.x = position.x;
        laser.y = position.y;
        laser.anchor.set(0.5,0.5);
        laser.speed = 20;
        if(type === "good" && rocket.tek.leftFlare && rocket.tek.rightFlare && keys.ArrowUp) {
            laser.speed = 40;
        }
        laser.scale.set(3*scaleFactor);
        laser.rotation = -dir;
        lasers.push(laser);
        app.stage.addChild(laser);
    }
    function press(key){
        if(keys[key]){
            keys[key] = false;
            return true;
        }
        return false;
    }
    addEventListener("mousedown",function(e){
        if(e.button == 0) {
            keys.mouse = true;
        } else if(e.button == 2) {
            keys.rightMouse = true;
        }
        mouseX = e.pageX;
        mouseY = e.pageY;
    });
    addEventListener("mouseup",function(e){
        if(e.button == 0) { 
            keys.mouse = false;
        } else if(e.button == 2) {
            keys.rightMouse = true;
        }
    });
    addEventListener("blur", function (){
        keys = {};
    });
    addEventListener("mousemove",function(e){
        mouseX = e.pageX;
        mouseY = e.pageY;
    });
    var learnSpeed = 2;
    var answersLocked = false;
    var code = ["R", "E", "S", "T", "O", "R", "E"];
    var codeNum = 0;
    var mistakeReview = false;
    addEventListener("keydown", function (e){
        if(code[codeNum] === e.key) {
            ++codeNum;
            if(codeNum === code.length) {
                codeNum = 0;
                healthBar.width = 200;
                energyBar.width = 200;
                if(!invincible) {
                    invincible = true;
                    rocket.alpha = 0.5;
                    setTimeout(function() {
                        invincible = false;
                        rocket.alpha = 1;
                    }, 5000);
                }
            }
        }
        if(!reverse) {
            handleNumber(e);
        } else {
            e.preventDefault();
            handleText(e);
        }
        keys[e.key] = true;
        if(e.ctrlKey) {
            keys.ctrl = true;
        }
        if(e.shiftKey) {
            keys.shift = true;
        }
        if(e.altKey) {
            keys.alt = true;
        }
    });
    function handleText(e) {
        if(answersLocked) {
            return;
        }
        if(e.key === "Enter") {
            answersLocked = true;
            textDiv.innerHTML = curVerse;
            textDiv.style.color = "green";
            setTimeout(function() {
                textDiv.style.color = "white";
                answersLocked = false;
                typingIndex = 0;
                textDiv.innerHTML = "";
                curVerse = randVerse();
                correctAnswer = curVerse[0];
                curVerse = curVerse[1];
                numDiv.innerHTML = correctAnswer;
            },3000);
        } else {
            var keystroke = e.key.toLowerCase();
            var words = curVerse.split(" ");
            if(keystroke === words[typingIndex][0].toLowerCase()) {
                textDiv.innerHTML += words[typingIndex++] + " ";
                if(typingIndex === typingMax || typingIndex >= words.length) {
                    if(restoreHealthWithQuestion) {
                        healthBar.width += 10 * typeBonus;
                    }
                    if(energyBar.width + 40 * typeBonus > 200) {
                        healthBar.width += (energyBar.width + 40 * typeBonus - 200)/3;
                        energyBar.width = 200;
                    } else {
                        energyBar.width += 40 * typeBonus;
                    }
                    if(healthBar.width > 200) {
                        healthBar.width = 200;
                    }
                    if(verseTracking[correctAnswer]) {
                        verseTracking[correctAnswer].correct += 5;
                    } else {
                        verseTracking[correctAnswer] = {correct: 5, incorrect: 0};
                    }
                    numDiv.innerHTML = "";
                    --questionsLeft;
                    if(questionsLeft <= 0) {
                        if(chapter !== false) {
                            if(rangeDiv.innerHTML !== "Review") {
                                var range = rangeDiv.innerHTML;
                            } else {
                                range = storeRange;
                            }
                            var full = true;
                            if (range.split("-")[0] === "1") {
                                var arr = range.split(/\-|\,/);
                                if(Number(arr[1]) + 3 < rom18[chapter-1].length) {
                                    range = (Number(arr[1])) + "-" + (Number(arr[1]) + 3);
                                } else if(Number(arr[1]) < rom18[chapter-1].length) {
                                    range = arr[1] + "-" + rom18[chapter-1].length;
                                }
                                full = false;
                                rangeDiv.innerHTML = range;
                                mistakeReview = false;
                            } else {
                                var arr = range.split(/\-|\,/);
                                range = "1-" + arr[1];
                                rangeDiv.innerHTML = range;
                                mistakeReview = false;
                            }
                            var cur = range.split(/\-|\,/);
                            if(Number(cur[0]) < Number(cur[1]) && Number(cur[0]) >= 0) {
                                if(Number(cur[1]) <= rom18[chapter-1].length) {
                                    params.min = cur[0];
                                    params.max = cur[1];
                                }
                            }
                            if(full && !mistakeReview) {
                                questionsLeft = params.max/learnSpeed;
                            } else {
                                questionsLeft = params.max/(2*learnSpeed);
                            }
                        }
                    }
                    typingIndex = 0;
                    textDiv.innerHTML = "";
                    curVerse = randVerse();
                    correctAnswer = curVerse[0];
                    curVerse = curVerse[1];
                    numDiv.innerHTML = correctAnswer;
                }
            }   
        }
    }
    function handleNumber(e) {
        if(!answersLocked && ((Number(e.key) >= 0 && e.key !== " ") || e.key === "." || e.key === ":")) {
            numDiv.innerHTML += e.key;
        }
        if(e.key === "Enter" && !answersLocked) {
            if (numDiv.innerHTML === correctAnswer || (chapter !== false && (correctAnswer.split(".")[1] === numDiv.innerHTML)) || numDiv.innerHTML.replace(" ",".") === correctAnswer || numDiv.innerHTML.replace(":",".") === correctAnswer) { 
                if(restoreHealthWithQuestion) {
                    healthBar.width += 10;
                }
                if(energyBar.width + 40 > 200) {
                    healthBar.width += (energyBar.width + 40 - 200)/3;
                    energyBar.width = 200;
                } else {
                    energyBar.width += 40;
                }
                if(healthBar.width > 200) {
                    healthBar.width = 200;
                }
                if(verseTracking[correctAnswer]) {
                    verseTracking[correctAnswer].correct += 5;
                } else {
                    verseTracking[correctAnswer] = {correct: 5, incorrect: 0};
                }
                numDiv.innerHTML = "";
                --questionsLeft;
                if(questionsLeft <= 0) {
                    if(chapter !== false) {
                        if(rangeDiv.innerHTML !== "Review") {
                            var range = rangeDiv.innerHTML;
                        } else {
                            range = storeRange;
                        }
                        var full = true;
                        if (range.split("-")[0] === "1") {
                            var arr = range.split(/\-|\,/);
                            if(Number(arr[1]) + 3 < rom18[chapter-1].length) {
                                range = (Number(arr[1])) + "-" + (Number(arr[1]) + 3);
                            } else if(Number(arr[1]) < rom18[chapter-1].length) {
                                range = arr[1] + "-" + rom18[chapter-1].length;
                            }
                            full = false;
                            rangeDiv.innerHTML = range;
                            mistakeReview = false;
                        } else {
                            var arr = range.split(/\-|\,/);
                            range = "1-" + arr[1];
                            rangeDiv.innerHTML = range;
                            mistakeReview = false;
                        }
                        var cur = range.split(/\-|\,/);
                        if(Number(cur[0]) < Number(cur[1]) && Number(cur[0]) >= 0) {
                            if(Number(cur[1]) <= rom18[chapter-1].length) {
                                params.min = cur[0];
                                params.max = cur[1];
                            }
                        }
                        if(full && !mistakeReview) {
                            questionsLeft = params.max/learnSpeed;
                        } else {
                            questionsLeft = params.max/(2*learnSpeed);
                        }
                    }
                }
            } else {
                if(verseTracking[correctAnswer]) {
                    verseTracking[correctAnswer].incorrect += 5;
                } else {
                    verseTracking[correctAnswer] = {correct: 0, incorrect: 5};
                }
                answersLocked = true;
                numDiv.style.color = "red";
                var corAns = correctAnswer;
                setTimeout(function() {
                    numDiv.style.color = "green";
                    numDiv.innerHTML = corAns;
                },1000);
                setTimeout(function() {
                    numDiv.style.color = "white";
                    numDiv.innerHTML = "";
                    answersLocked = false;
                },2000);
            }

            curVerse = randVerse();
            correctAnswer = curVerse[0];
            curVerse = curVerse[1];
            textDiv.innerHTML = curVerse;
        }
        if(e.key === "Delete" || e.key === "Backspace") {
            numDiv.innerHTML = "";
        }
    }
    addEventListener("keyup", function (e){
        keys[e.key] = false;
        console.log(e.ctrlKey);
        keys.ctrl = e.ctrlKey;
        keys.shift = e.shiftKey;
        keys.alt = e.altKey;
    });
